# ===== SERVER =====
server.port=8080

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmUsage
app.jwt.expiration-ms=86400000

# ===== MAIL (Configure with your SMTP provider) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Portfolio owner email to receive contact form messages
app.portfolio.owner-email=your_email@gmail.com

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===== LOGGING =====
logging.level.com.portfolio=DEBUG
logging.level.org.springframework.security=INFO
