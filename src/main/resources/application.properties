# ===== SERVER =====
server.port=8080

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
app.jwt.secret=${JWT_SECRET}

app.jwt.expiration-ms=86400000

# ===== MAIL (Configure with your SMTP provider) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Portfolio owner email to receive contact form messages
app.portfolio.owner-email=${OWNER_EMAIL}

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://192.168.1.11:3000
# ===== LOGGING =====
logging.level.com.portfolio=DEBUG
logging.level.org.springframework.security=INFO
